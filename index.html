<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競合分析DB | 三宮エリア</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="brand-dot"></span>
      <span class="brand-text">競合分析 <em>DB</em></span>
      <span class="brand-area">三宮エリア</span>
    </div>
    <div class="nav-actions">
      <button class="btn-ghost" onclick="openModal('add')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        店舗追加
      </button>
      <button class="btn-ghost" onclick="openModal('mystore')">自店設定</button>
    </div>
  </div>
</nav>

<div class="page-wrap">

  <!-- ヘッダーサマリー -->
  <header class="page-header">
    <div class="header-left">
      <h1>三宮エリア<br><span>競合インテリジェンス</span></h1>
      <p class="header-sub">デリヘル・ホテヘル・ハイブリッド店舗の価格・スタッフ・HP品質を横断比較</p>
    </div>
    <div class="kpi-row" id="kpi-row">
      <!-- JSで生成 -->
    </div>
  </header>

  <!-- フィルター・ソート -->
  <div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn active" data-type="all" onclick="filterType('all', this)">すべて</button>
      <button class="filter-btn" data-type="deli" onclick="filterType('deli', this)">デリヘル</button>
      <button class="filter-btn" data-type="hotel" onclick="filterType('hotel', this)">ホテヘル</button>
      <button class="filter-btn" data-type="hybrid" onclick="filterType('hybrid', this)">ハイブリッド</button>
    </div>
    <div class="sort-group">
      <label class="sort-label">並び替え</label>
      <select id="sort-select" onchange="sortStores()">
        <option value="score">AI総合スコア</option>
        <option value="price_asc">価格（安い順）</option>
        <option value="price_desc">価格（高い順）</option>
        <option value="cast">在籍人数</option>
        <option value="reviews">口コミ数</option>
      </select>
    </div>
  </div>

  <!-- 店舗カードグリッド -->
  <div class="store-grid" id="store-grid">
    <!-- JSで生成 -->
  </div>

  <!-- 自店 vs 競合 比較テーブル -->
  <section class="compare-section">
    <h2 class="section-title">価格比較テーブル <span>自店 vs 競合</span></h2>
    <div class="table-wrap">
      <table class="compare-table" id="compare-table">
        <!-- JSで生成 -->
      </table>
    </div>
  </section>

</div>

<!-- 店舗追加モーダル -->
<div class="modal-overlay" id="modal-add" onclick="closeModalIfBg(event, 'add')">
  <div class="modal">
    <div class="modal-header">
      <h3>競合店舗を追加</h3>
      <button class="modal-close" onclick="closeModal('add')">✕</button>
    </div>

    <div class="modal-tabs">
      <button class="mtab active" onclick="switchMTab('url', this)">URLから自動解析</button>
      <button class="mtab" onclick="switchMTab('manual', this)">手動入力</button>
    </div>

    <div id="mtab-url" class="mtab-content active">
      <div class="form-group">
        <label>シティヘブン or 公式URL</label>
        <input type="text" id="input-url" placeholder="https://www.cityheaven.net/hyogo/..." />
      </div>
      <div class="ai-note">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 6.5v3.5M7 4.5v.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        URLを貼ると店舗名・価格・在籍数・AIスコアを自動抽出します
      </div>
      <button class="btn-primary" onclick="analyzeURL()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M9 7l-2-2-2 2M7 5v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        AIで解析・登録
      </button>
      <div id="analyze-status" class="analyze-status"></div>
    </div>

    <div id="mtab-manual" class="mtab-content">
      <div class="form-grid-2">
        <div class="form-group">
          <label>店舗名 *</label>
          <input type="text" id="m-name" placeholder="神戸○○ヘルス" />
        </div>
        <div class="form-group">
          <label>業態 *</label>
          <select id="m-type">
            <option value="deli">デリヘル</option>
            <option value="hotel">ホテヘル</option>
            <option value="hybrid">ハイブリッド</option>
          </select>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>電話番号</label>
          <input type="text" id="m-tel" placeholder="078-xxx-xxxx" />
        </div>
        <div class="form-group">
          <label>在籍人数</label>
          <input type="number" id="m-cast" placeholder="50" />
        </div>
      </div>
      <div class="form-section-label">価格設定</div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>60分 通常価格（円）</label>
          <input type="number" id="m-p60" placeholder="19800" />
        </div>
        <div class="form-group">
          <label>60分 新規最安値（円）</label>
          <input type="number" id="m-p60new" placeholder="17600" />
        </div>
      </div>
      <div class="form-grid-3">
        <div class="form-group">
          <label>指名料（円）</label>
          <input type="number" id="m-shimei" placeholder="2200" />
        </div>
        <div class="form-group">
          <label>特別指名料（円）</label>
          <input type="number" id="m-special" placeholder="1100" />
        </div>
        <div class="form-group">
          <label>入会金（円）</label>
          <input type="number" id="m-entry" placeholder="1100" />
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>シティヘブンURL</label>
          <input type="text" id="m-url" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label>口コミ総数</label>
          <input type="number" id="m-reviews" placeholder="200" />
        </div>
      </div>
      <button class="btn-primary" onclick="addManual()">登録する</button>
    </div>
  </div>
</div>

<!-- 自店設定モーダル -->
<div class="modal-overlay" id="modal-mystore" onclick="closeModalIfBg(event, 'mystore')">
  <div class="modal">
    <div class="modal-header">
      <h3>自店設定</h3>
      <button class="modal-close" onclick="closeModal('mystore')">✕</button>
    </div>
    <div class="form-group">
      <label>店舗名</label>
      <input type="text" id="my-name" placeholder="（新店舗名）" />
    </div>
    <div class="form-grid-2">
      <div class="form-group">
        <label>60分 予定価格（円）</label>
        <input type="number" id="my-p60" placeholder="18000" />
      </div>
      <div class="form-group">
        <label>新規最安値（円）</label>
        <input type="number" id="my-p60new" placeholder="15000" />
      </div>
    </div>
    <div class="form-grid-2">
      <div class="form-group">
        <label>指名料（円）</label>
        <input type="number" id="my-shimei" placeholder="2200" />
      </div>
      <div class="form-group">
        <label>特別指名料（円）</label>
        <input type="number" id="my-special" placeholder="1100" />
      </div>
    </div>
    <button class="btn-primary" onclick="saveMyStore()">保存</button>
  </div>
</div>

<!-- 店舗詳細モーダル -->
<div class="modal-overlay" id="modal-detail" onclick="closeModalIfBg(event, 'detail')">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3 id="detail-title">店舗詳細</h3>
      <button class="modal-close" onclick="closeModal('detail')">✕</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
